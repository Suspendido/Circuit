server:
  name: "Unconfigured"
  type: DEFAULT
mongo:
  ip: "127.0.0.1"
  port: 27017
  database: "Circuit"
  auth:
    enabled: false
    username: ""
    password: ""
redis:
  address: "127.0.0.1"
  port: 6379
  auth:
    enabled: false
    password: ""

# Module configuration - enable/disable individual features
# If a module fails, other modules will continue to work
modules:
  rank:
    enabled: true  # Rank/Tag/VIP management commands
  essentials:
    enabled: true  # Basic utility commands (fly, tp, gm, etc.)
  player:
    enabled: true  # Player commands (ping, list, msg, etc.)
  server:
    enabled: true  # Server management commands
  punishment:
    enabled: true  # Ban, mute, kick commands
  staff:
    enabled: true  # Staff chat, freeze, chat moderation
  queue:
    enabled: false # Queue system for server transfers
    queues:
      - "Squads"
      - "Kitmap"
    hub-server: "Hub-01"
    hub-aliases:
      - "hub"
      - "lobby"